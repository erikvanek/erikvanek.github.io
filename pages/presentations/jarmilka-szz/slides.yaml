    layout: quote
    content: ""
    quote: "Někdy si sama nejsem jistá, jaký typ služby by ten člověk potřeboval. Velmi často nevím, na jakého odborníka se sama obrátit."
    author: "sociální pracovnice na obci 2. typu"
    quote2: "Reálně [klienti] nevědí ani, jakou službu by vlastně potřebovali, protože nevědí, co se nabízí."
    author2: "poskytovatel sociální služby"
