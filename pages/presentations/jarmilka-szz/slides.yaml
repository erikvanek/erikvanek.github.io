#            vhledy -> 4vrstvý model -- (break) -- 3 workshopy -> 4 příl. -> DNY AI
#   ČÁST 2 - Jarmilka: co to je -> principy -> 5 kroků -> RITE -> v2
#   Závěr: co Jarmilka neopraví -> díky (unicorns)
#
# SPEAKER NOTES: záměrně PRÁZDNÉ (speaker_notes: ""). Erik si je píše ručně.
# Slidy drženy "lehké": ploché odrážky, žádné hluboké vnořování (méně velikostí písma).
