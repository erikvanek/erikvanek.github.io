  # ════════════════════ ČÁST 2 - JARMILKA ═════════════════════════════════
  - heading: "Jarmilka"
    layout: section-break
    content: |
      ## Část 2
    images: []
    speaker_notes: ""

  - heading: "Co je Jarmilka"
    layout: two-column
    content: ""
    columns:
      - type: text
        content: |
          - Digitální **průvodkyně** sítí služeb
          - Klient popíše situaci vlastními slovy
            - Jarmilka poradí, "co dělat, když…"
          - Bez odborná terminologie a nutnosti se orientovat v systému
      - type: image
        src: /img/2024/case-studies/jarmilka/jarmilka-laptop.png
        width: 600
        height: 380
        alt: "Jarmilka v okně prohlížeče - avatar průvodkyně a uvítací chat"
        caption: ""
    images: []
    speaker_notes: ""

  - heading: "Návrh začal u principů"
    layout: heading-body
    content: |
      - Nezačal jsem obrazovkami, ale **kontextem užití**
        - Ne-časté použití, citlivé téma, ne-tech uživatelé, budování důvěry
      - Z toho jsem odvodil **návrhové principy**
        - Progressive disclosure, explorability, learnability, indikace postupu
      - Teprve potom vznikaly první papírové prototypy
    images: []
    speaker_notes: ""

  - heading: "Pět kroků ke konkrétní službě"
    layout: two-column
    content: ""
    columns:
      - type: text
        content: |
          **Důvěra → Popis → Kontrola → Výběr → Kontakt**
          - Buduje důvěru
          - Ujišťuje se, že rozumí
          - Doporučuje nejvhodnější služby
      - type: image
        src: /img/2024/case-studies/jarmilka/screens/Intro-prompt.png
        width: 560
        height: 380
        alt: "Obrazovka Jarmilky - pole pro popis situace a spodní lišta s pěti kroky průchodu"
        caption: "▶ Vyzkoušet interaktivní prototyp"
        source_url: "https://www.figma.com/proto/bfxhhYTW26rwx3KTTqx1GS/Jarmilka?node-id=9-3&starting-point-node-id=9%3A3"
    images: []
    speaker_notes: ""

  - heading: "Průběh prototypování"
    layout: two-column
    content: ""
    columns:
      - type: text
        content: |
          - Papírový prototyp testován metodou **RITE** + indikace **SUS**
          - Zjištění → konkrétní návrhy změn → tvorba **interaktivního prototypu**
      - type: image
        src: /img/2024/case-studies/jarmilka/proces/testing-I.jpg
        width: 540
        height: 380
        alt: "Uživatelské testování papírového prototypu Jarmilky - respondent prochází obrazovky"
        caption: ""
    images: []
    speaker_notes: ""

  # ─── ZÁVĚR ─────────────────────────────────────────────────────────────────
  - heading: "Co Jarmilka neopraví"
    layout: heading-body
    content: |
      - **Není stříbrná kulka** - jen jeden nástroj, jedna vrstva v širším řešení
      - **Není pro každého** - část cílovky AI chatbota nepřijme, a to je v pořádku
      - Etika: může při chybě uškodit - riziko lze minimalizovat, ne eliminovat

      > Jarmilka z povahy wicked problémů nemůže vyřešit všechny problémy. Může být ale hodnotnou součástí širšího řešení.
    images: []
    speaker_notes: ""

