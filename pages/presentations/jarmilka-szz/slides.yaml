  # VPRAVO: QR na portfolio (/presentations/img/qrcode_portfolio.png, 190px, bílá karta) - hardcoded v HTML.
  - heading: "Díky"
    layout: statement
    content: |
      Tímto chci poděkovat všem, s nimiž jsem se mohl během práce na tomto projektu potkat.

      Zejména těm, které nazývám jednorožci – lidé z praxe, kteří se nebojí přesahovat své role a hledat kreativní cesty pro řešení složitých problémů. Na některé rozhovory dodnes rád vzpomínám i přestože probíraná témata nebyla jednoduchá.

      Kdyby vás zajímalo, na čem dalším jsem pracoval, mrkněte na erikvanek.com/dis-kisk.

      🙏
    images: []
    speaker_notes: ""
