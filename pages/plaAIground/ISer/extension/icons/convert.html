<!DOCTYPE html>
<html>
<head>
    <title>ISer Icon Generator</title>
    <style>
        body { font-family: system-ui, sans-serif; padding: 40px; background: #1a1a2e; color: white; }
        h1 { color: #eee; }
        .icons { display: flex; gap: 40px; margin: 30px 0; }
        .icon-box { text-align: center; }
        canvas { background: #333; border-radius: 8px; }
        button {
            margin-top: 10px;
            padding: 12px 24px;
            font-size: 14px;
            background: #0000dc;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        button:hover { background: #0000aa; }
        .size-label { margin-top: 8px; color: #888; }
        .instructions {
            background: #2a2a4a;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
        }
        .instructions ol { margin: 10px 0; padding-left: 20px; }
        .instructions li { margin: 8px 0; }
    </style>
</head>
<body>
    <h1>🎭 ISer Icon Generator</h1>

    <div class="instructions">
        <strong>Instructions:</strong>
        <ol>
            <li>Click each "Download" button below</li>
            <li>Save files as <code>icon16.png</code>, <code>icon48.png</code>, <code>icon128.png</code></li>
            <li>Replace the existing files in the <code>icons/</code> folder</li>
        </ol>
    </div>

    <div class="icons" id="icons"></div>

    <script>
        const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <circle cx="64" cy="64" r="64" fill="#0000dc"/>
  <circle cx="64" cy="68" r="38" fill="#f0c8a0"/>
  <path d="M30 50 Q34 22 64 18 Q94 22 98 50 Q90 35 64 30 Q38 35 30 50" fill="#2d2d2d"/>
  <line x1="42" y1="48" x2="56" y2="52" stroke="#2d2d2d" stroke-width="4" stroke-linecap="round"/>
  <line x1="72" y1="52" x2="86" y2="48" stroke="#2d2d2d" stroke-width="4" stroke-linecap="round"/>
  <circle cx="49" cy="62" r="5" fill="#2d2d2d"/>
  <circle cx="79" cy="62" r="5" fill="#2d2d2d"/>
  <line x1="64" y1="66" x2="64" y2="78" stroke="#d4a070" stroke-width="3" stroke-linecap="round"/>
  <path d="M42 86 Q53 80 64 86 Q75 80 86 86 Q75 94 64 88 Q53 94 42 86" fill="#2d2d2d"/>
  <path d="M48 96 Q64 110 80 96" stroke="#2d2d2d" stroke-width="3" fill="none" stroke-linecap="round"/>
</svg>`;

        const sizes = [16, 48, 128];
        const container = document.getElementById('icons');

        sizes.forEach(size => {
            const box = document.createElement('div');
            box.className = 'icon-box';

            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            canvas.id = `c${size}`;
            canvas.style.width = `${Math.max(size, 64)}px`;
            canvas.style.height = `${Math.max(size, 64)}px`;

            const btn = document.createElement('button');
            btn.textContent = `Download icon${size}.png`;
            btn.onclick = () => {
                const link = document.createElement('a');
                link.download = `icon${size}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            };

            const label = document.createElement('div');
            label.className = 'size-label';
            label.textContent = `${size}×${size} px`;

            box.appendChild(canvas);
            box.appendChild(btn);
            box.appendChild(label);
            container.appendChild(box);

            // Render
            const ctx = canvas.getContext('2d');
            const img = new Image();
            img.onload = () => ctx.drawImage(img, 0, 0, size, size);
            img.src = 'data:image/svg+xml;base64,' + btoa(svg);
        });
    </script>
</body>
</html>
