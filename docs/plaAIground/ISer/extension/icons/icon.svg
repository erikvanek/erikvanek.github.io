<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Background circle - MUNI blue -->
  <circle cx="64" cy="64" r="64" fill="#0000dc"/>

  <!-- Face base - flat -->
  <circle cx="64" cy="68" r="38" fill="#f0c8a0"/>

  <!-- Hair (simple arc) -->
  <path d="M30 50 Q34 22 64 18 Q94 22 98 50 Q90 35 64 30 Q38 35 30 50" fill="#2d2d2d"/>

  <!-- Eyebrows (simple lines, raised) -->
  <line x1="42" y1="48" x2="56" y2="52" stroke="#2d2d2d" stroke-width="4" stroke-linecap="round"/>
  <line x1="72" y1="52" x2="86" y2="48" stroke="#2d2d2d" stroke-width="4" stroke-linecap="round"/>

  <!-- Eyes (simple dots) -->
  <circle cx="49" cy="62" r="5" fill="#2d2d2d"/>
  <circle cx="79" cy="62" r="5" fill="#2d2d2d"/>

  <!-- Nose (simple line) -->
  <line x1="64" y1="66" x2="64" y2="78" stroke="#d4a070" stroke-width="3" stroke-linecap="round"/>

  <!-- Signature thick mustache - flat style -->
  <path d="M42 86 Q53 80 64 86 Q75 80 86 86 Q75 94 64 88 Q53 94 42 86" fill="#2d2d2d"/>

  <!-- Simple smile arc -->
  <path d="M48 96 Q64 110 80 96" stroke="#2d2d2d" stroke-width="3" fill="none" stroke-linecap="round"/>
</svg>
