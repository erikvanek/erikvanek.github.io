<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="#1a5fb4"/>

  <!-- Face -->
  <ellipse cx="64" cy="68" rx="38" ry="42" fill="#f5d6ba"/>

  <!-- Hair (slightly receding, combed) -->
  <path d="M26 55 Q30 25 64 22 Q98 25 102 55 Q95 35 64 32 Q33 35 26 55" fill="#4a3728"/>
  <path d="M30 50 Q35 38 50 35 L48 45 Q38 48 30 50" fill="#4a3728"/>
  <path d="M98 50 Q93 38 78 35 L80 45 Q90 48 98 50" fill="#4a3728"/>

  <!-- Eyebrows (expressive, raised) -->
  <path d="M38 52 Q48 46 58 52" stroke="#3d2d1f" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M70 52 Q80 46 90 52" stroke="#3d2d1f" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Eyes (comedic, expressive) -->
  <ellipse cx="48" cy="62" rx="8" ry="10" fill="white"/>
  <ellipse cx="80" cy="62" rx="8" ry="10" fill="white"/>
  <circle cx="48" cy="64" r="5" fill="#2d1f1a"/>
  <circle cx="80" cy="64" r="5" fill="#2d1f1a"/>
  <circle cx="50" cy="62" r="2" fill="white"/>
  <circle cx="82" cy="62" r="2" fill="white"/>

  <!-- Nose -->
  <path d="M64 65 Q68 75 64 82 Q60 82 58 78" stroke="#d4a574" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Signature mustache -->
  <path d="M48 88 Q56 94 64 88 Q72 94 80 88 Q72 98 64 92 Q56 98 48 88" fill="#3d2d1f"/>

  <!-- Big comedic smile -->
  <path d="M44 95 Q64 115 84 95" stroke="#8b4513" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M48 96 Q64 110 80 96" fill="#7a2e2e"/>

  <!-- Teeth showing in smile -->
  <path d="M52 98 L76 98 Q64 105 52 98" fill="white"/>

  <!-- Ears -->
  <ellipse cx="24" cy="68" rx="6" ry="10" fill="#f5d6ba"/>
  <ellipse cx="104" cy="68" rx="6" ry="10" fill="#f5d6ba"/>

  <!-- Cheek lines (from smiling) -->
  <path d="M36 85 Q38 90 36 95" stroke="#d4a574" stroke-width="1.5" fill="none"/>
  <path d="M92 85 Q90 90 92 95" stroke="#d4a574" stroke-width="1.5" fill="none"/>

  <!-- "IS" text integrated subtly -->
  <text x="64" cy="120" text-anchor="middle" y="124" font-family="Arial Black, sans-serif" font-size="14" font-weight="bold" fill="#ffd700">ISer</text>
</svg>
