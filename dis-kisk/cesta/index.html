<!doctype html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cesta studiem DIS KISK — Erik Vaněk</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  /* Initiative wall (single mode). Content lives in cards.js (window.INITIATIVES); this file
     only renders + styles. Each initiative = one tile (photo or text); research voices (it.quotes)
     become their own quote tiles; overflow scrolls. Semester is metadata only — a colour-coded tag. */
  :root{ --ink:#1c1812; --quiet:#7a7060; --line:rgba(28,24,18,.30); --card:#ffffff; --cream:#f4efe5;
         --cell:clamp(120px,12.5vw,180px); --gap:18px; --big:calc(2 * var(--cell) + var(--gap)); }
  *{ box-sizing:border-box; }
  html,body{ margin:0; }
  body{ min-height:100%; background:#eeebe4; font-family:Inter, system-ui, sans-serif;
        overflow-y:auto; -webkit-font-smoothing:antialiased; }

  /* ---------- the wall: centred flex BANDS (one .band per row) ----------
     Tiles use 4 fixed footprints off --cell: 1×1 (default), 2×2 (.f-big = standard card),
     1×2 (.f-portrait = tall), 2×1 (.f-landscape = wide), plus 2.5×2 (.f-profile = the inverted
     profile box). 1-unit-tall tiles pair into a .stack so each column is a full card tall.
     Rows have intrinsic width and centre (no left-alignment). Standard card edge = --big. */
  .wall{ position:relative; min-height:100vh; display:flex; flex-direction:column; align-items:center;
         gap:var(--gap); padding:16px; }
  .band { display:flex; flex-direction:row; align-items:flex-start; gap:var(--gap); }
  .stack{ display:flex; flex-direction:column; gap:var(--gap); flex:none; }
  .tile{ position:relative; flex:none; width:var(--cell); height:var(--cell); border-radius:8px;
         overflow:hidden; background:#ddd; box-shadow:0 6px 18px rgba(28,24,18,.16); }
  .tile.f-portrait { width:var(--cell); height:var(--big); }                            /* 1×2 — tall */
  .tile.f-landscape{ width:var(--big);  height:var(--cell); }                           /* 2×1 — wide */
  .tile.f-big      { width:var(--big);  height:var(--big); }                            /* 2×2 — standard card */
  .tile.f-square   { width:var(--cell); height:var(--cell); }                           /* 1×1 — force square (overrides photo ratio) */
  .tile.f-profile  { width:calc(2.5 * var(--cell) + var(--gap)); height:var(--big); }   /* 2.5×2 — profile: half a cell wider than a standard 2×2 card */
  .tile img{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
  .tile-stamp{ position:absolute; left:0; right:0; bottom:0; padding:21px 12px 11px; display:flex;
               flex-direction:column; gap:6px; background:linear-gradient(to top, rgba(20,18,14,.55), rgba(20,18,14,0)); }
  .tile-title{ font-weight:700; font-size:18px; color:var(--cream); line-height:1.25; }
  .tile-ext{ font-size:.8em; font-weight:500; }   /* 🔗 marker on cards that lead off-site */
  .sem-tag{ position:absolute; top:10px; right:10px; z-index:2; padding:4px 10px; border-radius:4px;
            font-size:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:#fff;
            box-shadow:0 1px 6px rgba(0,0,0,.35); }

  /* clickable tile (has it.link → rendered as <a>) */
  a.tile{ text-decoration:none; color:inherit; cursor:pointer; transition:transform .15s ease, box-shadow .15s ease; }
  a.tile:hover{ transform:translateY(-3px); box-shadow:0 12px 28px rgba(28,24,18,.24); }
  a.tile:focus-visible{ outline:2px solid var(--ink); outline-offset:3px; }

  /* text tile — initiative without a photo */
  .tile.text{ background:var(--card); border:1px solid var(--line); display:flex; flex-direction:column; justify-content:flex-end; }
  .tile.text.missing{ border-style:dashed; background:rgba(255,255,255,.55); }
  .tile.text .tile-stamp{ position:static; background:none; padding:14px; }
  .tile.text .tile-title{ color:var(--ink); font-size:20px; }
  .tile.text.missing .tile-title{ color:var(--quiet); }

  /* profile "tile" — the inverted (dark) box: the ONE non-standard tile (2.5×2), the headline/identity. */
  .tile.hero{ background:var(--ink); box-shadow:0 6px 18px rgba(28,24,18,.16); border:none;
              border-radius:8px; overflow:hidden; display:flex; flex-direction:column; align-items:center;
              justify-content:center; text-align:center; padding:20px 34px; gap:12px; }
  .tile.hero .h-title{ margin:0; font-weight:800; font-size:clamp(22px,2.3vw,36px); line-height:1.16; letter-spacing:-.02em; color:var(--cream); }
  .tile.hero .h-sub{ margin:0; font-size:clamp(12px,1vw,15px); line-height:1.45; color:rgba(244,239,229,.72); max-width:460px; }

  /* thematic tags row (rozšířená) + extended stamp */
  .tile-tags{ display:flex; flex-wrap:wrap; gap:5px; }
  .tile-tags .tt{ padding:2px 8px; border-radius:999px; font-size:9.5px; font-weight:700;
                  letter-spacing:.04em; text-transform:uppercase; color:var(--cream);
                  background:rgba(255,255,255,.15); border:1px solid rgba(244,239,229,.5); }
  .tile-stamp.ext{ gap:7px; }
  .tile:not(.text) .tile-stamp.ext{ padding:14px 12px 12px;
        background:linear-gradient(to top, rgba(18,16,12,.6) 62%, rgba(18,16,12,0)); }
  .tile.text .tile-tags .tt{ color:var(--quiet); background:rgba(28,24,18,.05); border-color:var(--line); }

  /* quote tile — a standalone research voice; quote on top, project reference at the bottom */
  .tile.quote-tile{ background:var(--card); border:1px solid var(--line); display:flex; flex-direction:column;
                    justify-content:space-between; gap:10px; padding:16px 15px 13px; overflow:hidden; }
  .tile.quote-tile::before{ content:'„'; position:absolute; top:-4px; right:11px; font-size:44px; line-height:1;
                            font-weight:800; color:rgba(28,24,18,.07); pointer-events:none; }
  .tile.quote-tile > *{ position:relative; }
  .tile.quote-tile .qt-text{ margin:0; font-style:italic; font-size:clamp(12px,.95vw,15px); line-height:1.45; color:var(--ink); }
  .tile.quote-tile .qt-ref{ font-size:10px; font-weight:700; letter-spacing:.05em; text-transform:uppercase; color:var(--quiet); }

  /* structure pass (Erik 2026-06-11): tiles show ONLY the semester badge + title.
     chips + thematic tags are hidden (data kept) until the portfolio rework re-introduces them — see plan.md. */
  .tile-chips, .tile-tags{ display:none !important; }
</style>
</head>
<body>
  <div id="bau-grid" class="wall"></div>

  <script src="cards.js"></script>
  <script>
  (function () {
    // semester = metadata only: colour + tag, never a heading
    var SEM_COLOR = { 'I':'#6B7A45','II':'#3E5A6E','III':'#B0552E','IV':'#6F2430','V':'#C26818','VI':'#9a7a23','?':'#7a7060' };

    // ---------- helpers ----------
    function el(tag, cls, text, styles){
      var n = document.createElement(tag);
      if (cls) n.className = cls;
      if (text != null) n.textContent = text;
      if (styles) for (var k in styles) n.style[k] = styles[k];
      return n;
    }
    // function stripEmoji(s){ return s.replace(/[^\w\sáčďéěíňóřšťúůýžÁČĎÉĚÍŇÓŘŠŤÚŮÝŽ&×—-]/g,'').trim().toLowerCase(); }
    function stripEmoji(s){ return s }
    function noEmoji(s){ return s}
    // function noEmoji(s){ return s.replace(/[^\p{L}\p{N}\s.,:–—&()'→↗←-]/gu,'').replace(/\s+/g,' ').trim(); }

    // snap each tile to one of 4 grid footprints: explicit fp wins, feature → 2×2,
    // tall photo → 1×2, wide photo → 2×1, otherwise (text + near-square) → 1×1
    function footprint(it){
      if (it.fp)      return ' ' + it.fp;
      if (it.feature) return ' f-big';
      if (!it.photo)  return '';
      var r = it.photo.ratio || 1;
      if (r < 0.85) return ' f-portrait';
      if (r > 1.25) return ' f-landscape';
      return '';
    }

    // one initiative → one tile (thematic tags + emoji-stripped title on a stamp; chips kept but hidden).
    // A tile with it.link becomes an <a> so the whole card is clickable.
    function makeTile(it, fpOverride){
      var fp = (fpOverride != null) ? (' ' + fpOverride) : footprint(it);
      var tag = it.link ? 'a' : 'div';
      var tile;
      if (it.photo){
        tile = el(tag,'tile'+fp);
        var img = document.createElement('img'); img.src=it.photo.src; img.alt=it.photo.alt||''; tile.appendChild(img);
      } else {
        tile = el(tag,'tile text'+(it.missing?' missing':'')+fp);
      }
      var isExt = it.link && /^https?:\/\//.test(it.link);   // external URL → opens in a new tab
      if (it.link){
        tile.setAttribute('href', it.link);
        if (isExt){ tile.setAttribute('target','_blank'); tile.setAttribute('rel','noopener'); }
      }
      var tagText = it.tag ? (/^\d/.test(it.tag) ? it.tag : 'semestr '+it.tag) : 'semestr '+it.sem;
      tile.appendChild(el('span','sem-tag', tagText, {background: it.color || SEM_COLOR[it.sem]}));
      var stamp = el('div','tile-stamp ext');
      if (it.tags && it.tags.length){
        var tg = el('div','tile-tags');
        it.tags.forEach(function(t){ tg.appendChild(el('span','tt', t)); });
        stamp.appendChild(tg);
      }
      var titleEl = el('div','tile-title', noEmoji(it.title));
      if (isExt) titleEl.appendChild(el('span','tile-ext', ' 🔗'));   // signals the card leads off-site
      stamp.appendChild(titleEl);
      var chips = (it.chips || []).filter(function(c){ return stripEmoji(c.text) !== stripEmoji(it.title); });
      if (chips.length){
        var box = el('div','tile-chips');
        chips.forEach(function(c){ box.appendChild(el('span','tc'+(c.variant?(' '+c.variant):''), c.text)); });
        stamp.appendChild(box);
      }
      tile.appendChild(stamp);
      return tile;
    }
    function makeHero(){
      // profile · 2.5×2 — the ONE non-standard tile; entry point into the reveal.js study deck.
      // NOTE: /dis-kisk/portfolio/ is not built yet (see plan.md D12) — this link 404s until it is.
      var hero = el('a','tile hero f-profile');
      hero.setAttribute('href', '/dis-kisk/portfolio/');
      hero.appendChild(el('h1','h-title','Naučil jsem se řemeslo. Teď ho učím.'));
      hero.appendChild(el('p','h-sub','Šest semestrů, šest území. Cesta studiem Designu informačních služeb, 2023–2026.'));
      return hero;
    }
    function makeQuoteTile(text, ref){
      var tile = el('div','tile quote-tile f-landscape');   // research voices are 2:1
      tile.appendChild(el('p','qt-text', text));
      tile.appendChild(el('div','qt-ref', '— ' + ref));
      return tile;
    }

    // reading order: pinned start → lead tiles (opening) → middle (array order) → pinned end
    function orderedSeq(){
      var start = INITIATIVES.filter(function(i){ return i.pin === 'start'; });
      var end   = INITIATIVES.filter(function(i){ return i.pin === 'end'; });
      var lead  = INITIATIVES.filter(function(i){ return i.lead; }).sort(function(a,b){ return a.lead - b.lead; });
      var mid   = INITIATIVES.filter(function(i){ return !i.pin && !i.lead; });
      return start.concat(lead).concat(mid).concat(end);
    }

    // ---- entry kinds + band packing ----
    function isQuote(it){ return it.quote != null; }                           // standalone research-voice card
    function makeAny(it){ return isQuote(it) ? makeQuoteTile(it.quote, it.ref) : makeTile(it); }
    function tallOf(it){ return isQuote(it) ? false : isTallFp(footprint(it)); } // quote tiles are 2×1 (1 unit tall)
    function pick(arr, pred){ for (var i=0;i<arr.length;i++){ if (pred(arr[i])) return arr.splice(i,1)[0]; } return null; }
    function isTallFp(fp){ return fp === ' f-big' || fp === ' f-portrait'; }   // 2 units tall
    // group {el, tall} into card-tall columns: tall tiles stand alone; 1-unit tiles pair into a .stack
    function packColumns(descs){
      var cols = [], pend = null;
      function flush(){ if (pend){ var s = el('div','stack'); s.appendChild(pend); cols.push(s); pend = null; } }
      descs.forEach(function(d){
        if (d.tall){ flush(); cols.push(d.el); }
        else if (pend){ var s = el('div','stack'); s.appendChild(pend); s.appendChild(d.el); cols.push(s); pend = null; }
        else pend = d.el;
      });
      flush();
      return cols;
    }
    function emitBands(wall, cols, per){
      for (var i=0;i<cols.length;i+=per){
        var b = el('div','band');
        cols.slice(i, i+per).forEach(function(c){ b.appendChild(c); });
        wall.appendChild(b);
      }
    }

    // Opening composition — centred flex bands:
    //   row 1 — [Erik 2023 · 2×2] [profile · 2.5×2, centre] [Hackathon / Když nevíš · 2×1 stacked]
    //   row 2 — three standard project cards (quotes are skipped here — they can't be 2×2)
    //   rest  — projects + standalone research-voice quote cards, in data order, paired into columns, 3 per band
    function renderWall(){
      var wall = document.getElementById('bau-grid');
      wall.innerHTML = '';
      var seq  = orderedSeq();
      var erik = pick(seq, function(i){ return i.pin === 'start'; });
      var hack = pick(seq, function(i){ return i.title && /Hackathon/.test(i.title); });
      var second = pick(seq, function(i){ return i.title && /zeptej/.test(i.title); });  // "Když nevíš, tak se zeptej" — second tile in the opening stack

      var b1 = el('div','band');
      if (erik) b1.appendChild(makeTile(erik, 'f-big'));
      b1.appendChild(makeHero());
      var stack = el('div','stack');
      if (hack)   stack.appendChild(makeTile(hack,   'f-landscape'));
      if (second) stack.appendChild(makeTile(second, 'f-landscape'));
      b1.appendChild(stack);
      wall.appendChild(b1);

      // row 2 — first three PROJECT cards (skip quote entries so none renders as a 2×2)
      var row2 = [];
      while (row2.length < 3){
        var p = pick(seq, function(i){ return !isQuote(i); });
        if (!p) break;
        row2.push(p);
      }
      var b2 = el('div','band');
      row2.forEach(function(it){ b2.appendChild(makeTile(it, 'f-big')); });
      wall.appendChild(b2);

      // rest — every remaining entry (projects + standalone quotes) rendered by kind, in order
      emitBands(wall, packColumns(seq.map(function(it){
        return { el: makeAny(it), tall: tallOf(it) };
      })), 3);
    }

    // ---------- boot ----------
    renderWall();
  })();
  </script>
</body>
</html>
